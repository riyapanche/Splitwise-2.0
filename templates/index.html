<!DOCTYPE html>
<html>
    <head>
        <title>Splitwise</title>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/tesseract.js/5.0.4/tesseract.min.js"></script>
    </head>
    <body>
        <h1>Splitwise</h1>
        <input type="file" id="upload" accept="image/*">

        <ul id="items-list"></ul>

        <script src="/static/app.js"></script>
    </body>
</html>
