<!DOCTYPE html>
<html>
    <head>
        <title>Splitwise</title>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/tesseract.js/5.0.4/tesseract.min.js"></script>
    </head>
    <body>
        <h1>Splitwise</h1>
        <input type="file" id="upload" accept="image/*">
        <img id="preview" style="display: none; max-width: 400px;">
        <button id="scan-btn">Scan Receipt</button>
        <p id="status"></p>
        <pre id="output"></pre>
        <ul id="items-list"></ul>

        <script>
            const upload = document.getElementById('upload');
            const preview = document.getElementById('preview');
            const scanBtn = document.getElementById('scan-btn');
            const status = document.getElementById('status');
            const output = document.getElementById('output');
            const itemsList = document.getElementById('items-list');

            function parseReceipt(text) {
                const lines = text.split('\n');
                const items = [];
                
                for (const line of lines) {
                    if (line.toLowerCase().includes('total') || line.toLowerCase().includes('sub') || line.toLowerCase().includes('tax')) {
                        continue;
                    }
                    const priceMatch = line.match(/(\d+\.\d{2})/);
                    if (priceMatch) {
                        items.push(line.trim());
                    }
                }

                return items;
            }

            scanBtn.addEventListener('click', function() {
                if (preview.style.display === 'block') {
                    status.textContent = 'Scanning...';
                    Tesseract.recognize(
                        preview.src,
                        'eng',
                        { logger: m => console.log(m) }
                    ).then(({ data: { text } }) => {
                        status.textContent = 'Scan complete!';
                        output.textContent = text;
                        console.log(text);
                        const items = parseReceipt(text);
                        console.log(items);

                        itemsList.innerHTML = '';
                        for (const item of items) {
                            const li = document.createElement('li');
                            li.textContent = item;
                            itemsList.appendChild(li);
                        }
                    }).catch(err => {
                        status.textContent = 'Error scanning receipt.';
                        console.error(err);
                    });
                } else {
                    alert('Please upload a receipt image first.');
                }
            });

            upload.addEventListener('change', function() {
                const file = upload.files[0];
                const url = URL.createObjectURL(file);
                preview.src = url;
                preview.style.display = 'block';
            });
        </script>
    </body>
</html>
